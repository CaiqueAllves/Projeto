<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Marpex | Documentos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-base.css">
    <link rel="stylesheet" href="style-navegador.css">
    <link rel="stylesheet" href="style-permissoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style-mobile.css">
</head>

<body>

<div class="main-layout" style="display: flex;">
    <aside></aside>

    <main>
        <!-- TOPO -->
        <div class="topbar">
            <div class="topbar-left">
                <h2><i class="fa-solid fa-folder-open"></i> Documentos</h2>
            </div>
            <div class="topbar-right">
                <div class="user-info-card">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="displayUsername">User...</div>
                        <div class="user-email" id="userEmail">usuario@email.com</div>
                    </div>
                </div>
                <div class="logout" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </div>

        <div class="content" style="padding:32px; display:flex; flex-direction:column; gap:28px;">

            <!-- FILTROS E BUSCA -->
            <div class="filtros-container">
                <div class="filtros-btns">
                    <button class="filtro-btn active" onclick="filtrarDocumentos('todos')">
                        <i class="fa-solid fa-list"></i> Todos
                    </button>
                    <button class="filtro-btn" onclick="filtrarDocumentos('pendentes')">
                        <i class="fa-solid fa-clock"></i> Pendentes
                    </button>
                    <button class="filtro-btn" onclick="filtrarDocumentos('assinados')">
                        <i class="fa-solid fa-check-circle"></i> Assinados
                    </button>
                </div>

                <div class="busca-container">
                    <input
                        type="text"
                        id="buscaDoc"
                        placeholder="Buscar documentos..."
                        onkeyup="buscarDocumentos()"
                    >
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <!-- TABELA DE DOCUMENTOS -->
            <div style="background:white; border-radius:12px; border:1px solid #f1f5f9; overflow:hidden;">
                <table id="tabelaDocumentos">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Tamanho</th>
                            <th>Data Upload</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Será preenchido dinamicamente via JavaScript -->
                    </tbody>
                </table>
            </div>

        </div>

        <!-- RODAPÉ -->
        <footer class="dashboard-footer">
            <span>© 2026 Marpex — Todos os direitos reservados</span>
                <span class="footer-version">v3.0</span>
        </footer>
    </main>
</div>

<script src="supabase.min.js"></script>
<script src="supabase-api.js"></script>
<script src="auth.js"></script>
<script src="navegador.js"></script>

</body>
</html>
