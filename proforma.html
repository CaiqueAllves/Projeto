<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Marpex | Proformas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-base.css">
    <link rel="stylesheet" href="style-navegador.css">
    <link rel="stylesheet" href="style-cadastro.css">
    <link rel="stylesheet" href="style-proforma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="main-layout" style="display: flex;">
    <aside></aside>

    <main>
        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-left">
                <h2><i class="fa-solid fa-file-invoice-dollar"></i> Proformas</h2>
            </div>
            <div class="topbar-right">
                <div class="user-info-card">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user" id="topbarAvatarIcon"></i>
                        <img id="topbarAvatarImg" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="displayUsername">—</div>
                        <div class="user-email" id="userEmail">—</div>
                    </div>
                </div>
                <div class="logout" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </div>

        <!-- CONTEÚDO -->
        <div class="content">

            <!-- FILTRO + AÇÕES -->
            <div class="page-header">
                <div class="header-left">
                    <div class="filter-wrapper">
                        <i class="fa-solid fa-magnifying-glass filter-icon"></i>
                        <input type="text" id="filtroProformas" placeholder="Filtrar por código, país, incoterm, empresa..." oninput="profFiltrar()">
                    </div>
                    <select id="filtroStatus" class="filter-select" onchange="profFiltrar()">
                        <option value="">Todos os status</option>
                        <option value="enviado">Enviado</option>
                        <option value="aprovado">Aprovado</option>
                        <option value="pendente">Pendente</option>
                        <option value="recusado">Recusado</option>
                    </select>
                </div>
                <div class="header-right">
                    <div id="profExcluidosWrapper">
                        <button class="btn-excluidos" onclick="profToggleExcluidos()">
                            <i class="fa-solid fa-trash-can"></i> Excluídos
                        </button>
                        <div class="prof-excluidos-panel" id="profExcluidosPanel">
                            <div class="prof-excluidos-titulo">
                                <i class="fa-solid fa-trash-can"></i> Proformas Excluídas
                            </div>
                            <div id="profExcluidosContainer"></div>
                        </div>
                    </div>
                    <button class="btn-cadastrar" onclick="window.open('formularios.html?tab=proposta', '_blank')">
                        <i class="fa-solid fa-plus"></i> Nova Proforma
                    </button>
                </div>
            </div>

            <!-- LISTA DE PROFORMAS -->
            <div class="empresas-lista" id="proformasLista">
                <div class="lista-header">
                    <span><i class="fa-solid fa-file-invoice-dollar"></i> Proformas Cadastradas</span>
                    <div class="lista-header-counts">
                        <span class="lista-count" id="listaCount">—</span>
                        <span class="prof-count-badge prof-count-enviado" id="countEnviado" style="display:none;">
                            <i class="fa-solid fa-paper-plane"></i> <span id="countEnviadoNum">0</span> enviadas
                        </span>
                        <span class="prof-count-badge prof-count-aprovado" id="countAprovado" style="display:none;">
                            <i class="fa-solid fa-circle-check"></i> <span id="countAprovadoNum">0</span> aprovadas
                        </span>
                        <span class="prof-count-badge prof-count-pendente" id="countPendente" style="display:none;">
                            <i class="fa-solid fa-clock"></i> <span id="countPendenteNum">0</span> pendentes
                        </span>
                        <span class="prof-count-badge prof-count-recusado" id="countRecusado" style="display:none;">
                            <i class="fa-solid fa-circle-xmark"></i> <span id="countRecusadoNum">0</span> recusadas
                        </span>
                    </div>
                </div>
                <div id="listaContainer" class="lista-scroll">
                    <div class="lista-vazia">
                        <i class="fa-solid fa-circle-notch fa-spin"></i> Carregando...
                    </div>
                </div>
            </div>

            <!-- RODAPÉ -->
            <footer class="dashboard-footer">
                <span>© 2026 Marpex — Todos os direitos reservados</span>
                <span class="footer-version">v3.0</span>
            </footer>
        </div>
    </main>
</div>

<!-- =============================================
     MODAL: CONFIRMAR EXCLUSÃO
============================================== -->
<div class="modal-overlay" id="modalExcluirProforma" onclick="profFecharModalExcluir()">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 480px;">
        <div class="modal-header" style="border-bottom: 2px solid #fee2e2;">
            <h3 style="color:#dc2626;"><i class="fa-solid fa-triangle-exclamation"></i> Excluir Proforma</h3>
        </div>
        <div class="modal-body">
            <p style="color:#374151; margin-bottom:16px;">Tem certeza que deseja excluir esta proforma? Esta ação não pode ser desfeita.</p>
            <div id="excluirProformaInfo" style="background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:16px;"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="profFecharModalExcluir()">Cancelar</button>
            <button id="btnConfirmarExcluirProforma" style="background:#dc2626; color:white; border:none; padding:10px 24px; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:8px;">
                <i class="fa-solid fa-trash"></i> Excluir
            </button>
        </div>
    </div>
</div>

<script src="supabase.min.js"></script>
<script src="supabase-api.js"></script>
<script src="auth.js"></script>
<script src="navegador.js"></script>
<script src="proforma.js"></script>
</body>
</html>
