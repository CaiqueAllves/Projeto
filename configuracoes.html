<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Marpex | Configurações</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-base.css">
    <link rel="stylesheet" href="style-navegador.css">
    <link rel="stylesheet" href="style-permissoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="main-layout" style="display: flex;">
    <aside></aside>

    <main>
        <div class="topbar">
            <div class="topbar-left">
                <h2><i class="fa-solid fa-gear"></i> Configurações</h2>
            </div>
            <div class="topbar-right">
                <div class="user-info-card">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="displayUsername">—</div>
                        <div class="user-email" id="userEmail">—</div>
                    </div>
                </div>
                <div class="logout" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </div>

        <div class="content" style="padding:32px; display:flex; flex-direction:column; gap:28px;">
            <div style="background:white; border-radius:12px; border:1px solid #f1f5f9; padding:60px; text-align:center; color:#94a3b8;">
                <i class="fa-solid fa-gear" style="font-size:48px; margin-bottom:16px; display:block;"></i>
                <h3 style="font-size:18px; font-weight:600; color:#64748b; margin-bottom:8px;">Configurações em construção</h3>
                <p style="font-size:14px;">Esta seção estará disponível em breve.</p>
            </div>
        </div>
    </main>
</div>

<script src="supabase.min.js"></script>
<script src="supabase-api.js"></script>
<script src="auth.js"></script>
<script src="navegador.js"></script>

</body>
</html>
